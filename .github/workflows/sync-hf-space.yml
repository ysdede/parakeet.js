name: Sync Demo to HF Space

on:
  push:
    branches: [master]
    paths:
      - "examples/demo/**"
      - "src/**"
      - "types/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/sync-hf-space.yml"
  workflow_dispatch:
    inputs:
      space_id:
        description: "Hugging Face Space repo id to deploy to"
        required: false
        default: "ysdede/parakeet.js-test"

env:
  # Test Space while validating the no-HF-build deployment. Switch to
  # ysdede/parakeet.js-demo after manual verification.
  HF_SPACE_ID: ${{ github.event.inputs.space_id || 'ysdede/parakeet.js-test' }}

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            examples/demo/package-lock.json

      - name: Install root dependencies for local source build
        run: npm ci

      - name: Use local parakeet.js package for demo build
        working-directory: examples/demo
        run: |
          node -e "
          const fs = require('fs');
          const p = require('./package.json');
          p.dependencies['parakeet.js'] = 'file:../..';
          fs.writeFileSync('package.json', JSON.stringify(p, null, 2) + '\n');
          "

      - name: Install demo dependencies
        working-directory: examples/demo
        run: npm install

      - name: Build demo static assets
        working-directory: examples/demo
        env:
          PARAKEET_LOCAL: "true"
          VITE_PUBLIC_BASE: "/"
        run: npm run build:local

      - name: Create prebuilt HF static export
        run: |
          set -euo pipefail
          rm -rf hf_export
          mkdir -p hf_export

          # Push prebuilt files to the Space root. This avoids HF-side static
          # builds, which currently require account credits.
          rsync -a --delete examples/demo/dist/ hf_export/

          # HF Static Spaces serve real COOP/COEP headers via README custom_headers.
          # The COI service worker is only for GitHub Pages and should not be used here.
          sed -i '/<script src="coi-serviceworker.js"><\/script>/d' hf_export/index.html
          rm -f hf_export/coi-serviceworker.js

          cat > hf_export/README.md << 'READMEEOF'
          ---
          title: Parakeet.js Demo
          emoji: 🦜
          colorFrom: indigo
          colorTo: blue
          sdk: static
          pinned: false
          header: mini
          fullWidth: true
          app_file: index.html
          license: mit
          short_description: NVIDIA Parakeet speech recognition for the browser
          models:
          - ysdede/parakeet-tdt-0.6b-v2-onnx
          - ysdede/parakeet-tdt-0.6b-v3-onnx
          datasets:
          - mozilla-foundation/common_voice_13_0
          tags:
          - parakeet-js
          - parakeet
          - onnx
          - webgpu
          - wasm
          - asr
          - speech-recognition
          - nvidia
          custom_headers:
            cross-origin-embedder-policy: require-corp
            cross-origin-opener-policy: same-origin
            cross-origin-resource-policy: cross-origin
          preload_from_hub:
          - ysdede/parakeet-tdt-0.6b-v2-onnx
          - ysdede/parakeet-tdt-0.6b-v3-onnx
          ---

          # 🦜 Parakeet.js Demo

          Browser-based speech recognition with NVIDIA Parakeet ASR models (WebGPU/WASM).

          This Space is deployed from prebuilt static assets generated by GitHub Actions.
          Hugging Face only serves the checked-in static files, so the Space does not
          require paid static-build credits.

          - [GitHub Repository](https://github.com/ysdede/parakeet.js)
          - [npm Package](https://www.npmjs.com/package/parakeet.js)
          - [API Documentation](https://ysdede.github.io/parakeet.js/api/)
          READMEEOF

          touch hf_export/.nojekyll
          echo "HF prebuilt static export ready:"
          find hf_export -maxdepth 2 -type f | sort

      - name: Push prebuilt static export to HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${HF_TOKEN:-}" ]; then
            echo "HF_TOKEN secret is required" >&2
            exit 1
          fi

          python -m pip install --upgrade huggingface_hub
          hf upload "$HF_SPACE_ID" hf_export . \
            --repo-type=space \
            --delete '*' \
            --commit-message "Sync prebuilt static demo (${GITHUB_SHA::7})"
